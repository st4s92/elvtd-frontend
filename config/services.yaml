services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Falls der MetaApiClient explizit konfiguriert werden soll
    App\Service\MetaApiClient:
        arguments:
            $baseUrl: '%metaapi.base_url%'
            $token: '%metaapi.token%'

    App\Service\LocaleSwitcher:
        arguments:
            $requestStack: '@request_stack'
            $security: '@security.helper'

    App\EventListener\LocaleListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest }